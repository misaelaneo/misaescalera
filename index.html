<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Misael Escalera — Personal Portfolio</title>
    <meta
      name="description"
      content="Portfolio of Misael Escalera, featuring professional experience, selected work, media reviews, personal background, and contact information."
    />
    <meta property="og:title" content="Misael Escalera — Personal Portfolio" />
    <meta
      property="og:description"
      content="Portfolio of Misael Escalera, featuring professional experience, selected work, media reviews, personal background, and contact information."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://misaescalera.com" />
    <script>
      // Apply saved/system theme before first paint to avoid a flash
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          var theme =
            saved === 'light' || saved === 'dark'
              ? saved
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
